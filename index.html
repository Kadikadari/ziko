<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <title>Z-LIVE | Pro Manager</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #00d4ff;
            --bg: #0f0c29;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 550px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin: 20px;
        }

        h2 {
            text-align: center;
            font-size: 28px;
            letter-spacing: 2px;
            margin-bottom: 30px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #00d4ff;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
            background: rgba(0, 0, 0, 0.4);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            padding: 15px 25px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s active;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-save {
            background: linear-gradient(45deg, #00ff88, #00bd68);
            color: #000;
            flex: 2;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.5);
        }

        .btn-delete {
            background: rgba(255, 50, 50, 0.1);
            color: #ff4444;
            border: 1px solid rgba(255, 50, 50, 0.3);
        }

        .btn-delete:hover {
            background: #ff4444;
            color: white;
        }

        .btn-search {
            background: rgba(0, 212, 255, 0.1);
            color: var(--secondary);
            border: 1px solid var(--secondary);
            padding: 10px 20px;
        }

        #statusMsg {
            text-align: center;
            margin-top: 25px;
            min-height: 24px;
            font-size: 15px;
            border-radius: 8px;
            padding: 10px;
        }

        .hidden { display: none; }

        /* تجميل شريط البحث */
        .search-box {
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.03);
            padding: 5px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Z-LIVE Pro Manager</h2>

    <!-- قسم الجهاز -->
    <div class="form-group">
        <label>كود الجهاز المستهدف (Device ID):</label>
        <div class="search-box">
            <input type="text" id="deviceId" placeholder="أدخل ID الجهاز هنا...">
            <button class="btn-search" onclick="fetchUser()">فحص 🔍</button>
        </div>
    </div>

    <hr style="opacity: 0.1; margin: 30px 0;">

    <!-- بيانات السيرفر الجديد -->
    <div class="form-group">
        <label>اسم السيرفر (ليظهر للمشترك):</label>
        <input type="text" id="serverName" placeholder="مثلاً: سيرفر VIP 1">
    </div>

    <div class="form-group">
        <label>نوع الاشتراك:</label>
        <select id="serverType" onchange="toggleFields()">
            <option value="xtream">Xtream Codes (Host/User/Pass)</option>
            <option value="m3u">M3U Link (Direct Link)</option>
        </select>
    </div>

    <!-- خانات Xtream -->
    <div id="xtreamFields">
        <div class="form-group">
            <label>رابط السيرفر (Host):</label>
            <input type="text" id="dns" placeholder="http://domain.com:8080">
        </div>
        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label>المستخدم:</label>
                <input type="text" id="user" placeholder="Username">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>كلمة المرور:</label>
                <input type="password" id="pass" placeholder="Password">
            </div>
        </div>
    </div>

    <!-- خانات M3U -->
    <div id="m3uFields" class="hidden">
        <div class="form-group">
            <label>رابط M3U المباشر:</label>
            <input type="text" id="m3uUrl" placeholder="http://server.com/get.php?auth=...">
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-save" onclick="saveServer()">حفظ وإضافة السيرفر ✅</button>
        <button class="btn-delete" onclick="deleteUser()">حذف الجهاز بالكامل ❌</button>
    </div>

    <div id="statusMsg"></div>
</div>

<script>
    // تهيئة Firebase (تأكد من مطابقة بياناتك)
    const firebaseConfig = {
        apiKey: "AIzaSyAokNdzSSm9FWg9fbP3u4rtv0qHLHQNr9o",
        databaseURL: "https://master-player-p2p-default-rtdb.europe-west1.firebasedatabase.app"
    };
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    function toggleFields() {
        const type = document.getElementById('serverType').value;
        document.getElementById('xtreamFields').classList.toggle('hidden', type !== 'xtream');
        document.getElementById('m3uFields').classList.toggle('hidden', type !== 'm3u');
    }

    function fetchUser() {
        const id = document.getElementById('deviceId').value.trim();
        if (!id) return showMsg("يرجى إدخال ID الجهاز أولاً", "#ff9900");
        
        db.ref('devices/' + id).once('value').then(s => {
            if (s.exists()) {
                showMsg("الجهاز مسجل وحالته: " + (s.val().status || "نشط") + " ✅", "#00ff88");
            } else {
                showMsg("جهاز جديد سيتم تفعيله عند الحفظ", "#00d4ff");
            }
        });
    }

    function saveServer() {
        const id = document.getElementById('deviceId').value.trim();
        const serverName = document.getElementById('serverName').value.trim();
        
        if (!id) return alert("أدخل كود الجهاز");
        if (!serverName) return alert("يرجى تسمية السيرفر");

        const type = document.getElementById('serverType').value;
        let serverData = {
            name: serverName,
            type: type === 'xtream' ? 'xtream_live' : 'm3u'
        };

        if (type === 'xtream') {
            serverData.dns = document.getElementById('dns').value.trim();
            serverData.username = document.getElementById('user').value.trim();
            serverData.password = document.getElementById('pass').value.trim();
            if(!serverData.dns || !serverData.username) return alert("أكمل بيانات Xtream");
        } else {
            serverData.m3uUrl = document.getElementById('m3uUrl').value.trim();
            if(!serverData.m3uUrl) return alert("أدخل رابط M3U");
        }

        // 1. تفعيل الجهاز
        db.ref('devices/' + id + '/status').set('active');

        // 2. إضافة السيرفر إلى قائمة السيرفرات
        db.ref('devices/' + id + '/servers').push(serverData).then(() => {
            showMsg("تم الحفظ وإضافة السيرفر بنجاح ✅", "#00ff88");
            
            // 3. تصفير الخانات تلقائياً
            resetFields();
        }).catch(e => showMsg("خطأ في الحفظ: " + e.message, "#ff4444"));
    }

    function resetFields() {
        document.getElementById('serverName').value = "";
        document.getElementById('dns').value = "";
        document.getElementById('user').value = "";
        document.getElementById('pass').value = "";
        document.getElementById('m3uUrl').value = "";
        // نترك ID الجهاز كما هو لسهولة إضافة سيرفر آخر لنفس الشخص
    }

    function deleteUser() {
        const id = document.getElementById('deviceId').value.trim();
        if (!id) return;
        if (confirm("هل أنت متأكد من حذف الجهاز وكافة سيرفراته نهائياً؟")) {
            db.ref('devices/' + id).remove().then(() => {
                showMsg("تم حذف الجهاز بالكامل 🗑️", "#ff4444");
                setTimeout(() => location.reload(), 2000);
            });
        }
    }

    function showMsg(t, c) {
        const m = document.getElementById('statusMsg');
        m.innerText = t;
        m.style.color = c;
        m.style.background = 'rgba(0,0,0,0.2)';
    }
</script>
</body>
</html>
